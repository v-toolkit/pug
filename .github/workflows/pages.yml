name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # ← change to master if that's your default branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodule for examples)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Assemble site (app files)
        run: |
          mkdir -p _site
          cp index.html styles.css .nojekyll _site/
          cp -r data js _site/

      - name: Build examples manifest + copy examples (same-origin)
        run: node scripts/build-manifest.js --src reference/puf-billing --out _site/examples

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
