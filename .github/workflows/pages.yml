name: Deploy to GitHub Pages

on:
  push:
    branches: [main] # ← set to your default branch (main or master)
  workflow_dispatch: # lets you trigger it manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # No submodules: reference/ is dev-only and is not published.

      - name: Assemble site (app files only — excludes test/, reference/, etc.)
        run: |
          mkdir -p _site
          cp index.html styles.css .nojekyll _site/
          cp -r data js _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
